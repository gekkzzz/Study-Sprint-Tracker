# ============================================================
# Example workflow — Full Stack in 200 Days sprint
# Copy this file into YOUR repository's .github/workflows/
# and update start_date to your actual start date.
# ============================================================

name: Study Sprint Tracker (Full Stack 200 Days)

on:
  push:
    branches:
      - main
    # Prevent an infinite loop: ignore the bot's own journal commits.
    paths-ignore:
      - '**.md'

# Required so the Action can commit the updated journal back to your repo.
permissions:
  contents: write

jobs:
  track-sprint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Track Full Stack Sprint Progress
        id: sprint
        uses: your-username/study-sprint-tracker@v1   # replace with real ref
        with:
          track_name: 'Full Stack'
          total_days: 200
          start_date: '2025-01-01'        # ← set your actual start date
          journal_file: 'STUDY_JOURNAL.md'

      - name: Echo progress
        run: echo "Sprint status — ${{ steps.sprint.outputs.progress }}"

      # Optional: post a summary in the GitHub Actions job summary panel.
      - name: Write job summary
        run: |
          echo "## Study Sprint Update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**${{ steps.sprint.outputs.progress }}**" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.sprint.outputs.goal_achieved }}" = "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🎉 **Congratulations — you completed the sprint!**" >> $GITHUB_STEP_SUMMARY
          fi
